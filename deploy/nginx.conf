# ============================================================================
# nginx para Ingenio Blocks
#   https://ingenioblocks.com
#
# REQUISITO PREVIO: el dominio debe apuntar a este servidor. En el panel DNS de
# ingenioblocks.com, crear:
#   A     @      <IP del servidor>
#   A     www    <IP del servidor>
# (o CNAME www → ingenioblocks.com). Recién cuando el DNS propague se puede
# emitir el certificado.
#
# Instalación:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/ingenioblocks
#   sudo ln -sf /etc/nginx/sites-available/ingenioblocks /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# El certificado lo pone certbot (para el dominio y el www):
#   sudo certbot --nginx -d ingenioblocks.com -d www.ingenioblocks.com
# ============================================================================

upstream ingenioblocks_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Todo el tráfico sin cifrar se redirige. Lo reescribe certbot igual, pero
# conviene que quede explícito.
server {
    listen 80;
    listen [::]:80;
    server_name ingenioblocks.com www.ingenioblocks.com;
    return 301 https://ingenioblocks.com$request_uri;
}

# www → apex: un solo host canónico (coincide con el canonical del SEO, que
# apunta a ingenioblocks.com sin www). Evita que Google vea dos sitios iguales.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.ingenioblocks.com;
    # certbot completa ssl_certificate / ssl_certificate_key acá.
    return 301 https://ingenioblocks.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ingenioblocks.com;

    # certbot completa ssl_certificate / ssl_certificate_key acá.

    # Tamaño máximo de subida: los PDF e imágenes de los modelos que carga la
    # clienta desde el panel. Sin esto nginx corta en 1 MB con un 413 confuso.
    client_max_body_size 25M;

    # --- Cabeceras de seguridad ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: activar recién cuando el sitio lleve un tiempo estable en HTTPS.
    # Una vez que el navegador lo recuerda, no se puede volver atrás fácilmente.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========================================================================
    # ARCHIVOS PROTEGIDOS — NO TOCAR
    #
    # protected_media/ guarda los PDF e imágenes de los modelos. Son el producto
    # que se vende: solo deben salir por el endpoint de Django, que verifica
    # membresía activa + curso otorgado + curso desbloqueado. Si nginx los
    # sirviera como estáticos, cualquiera con la URL se baja el año completo de
    # contenido sin pagar, y el control de acceso del LMS deja de existir.
    # Este bloque está por si alguien alguna vez agrega un alias por error.
    # ========================================================================
    location ^~ /protected_media/ {
        deny all;
        return 404;
    }

    # --- Estáticos de Django (panel, admin, correos) ---
    location /static/ {
        alias /srv/ingenioblocks/staticfiles/;
        expires 30d;
        access_log off;
    }

    # --- Media pública (portadas de la landing subidas desde el panel) ---
    location /media/ {
        alias /srv/ingenioblocks/media/;
        expires 7d;
        access_log off;
    }

    # --- Backend Django ---
    location ~ ^/(api|gestion|admin|dev)/ {
        proxy_pass http://ingenioblocks_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OJO: $remote_addr y NO $proxy_add_x_forwarded_for.
        #
        # $proxy_add_x_forwarded_for CONSERVA lo que mandó el cliente y le agrega
        # su IP al final. Como el encabezado lo escribe cualquiera, un atacante
        # puede inyectar IPs falsas: combinado con PROXY_COUNT, Django terminaría
        # leyendo una IP inventada y se anularían el bloqueo de django-axes y el
        # rate limiting de DRF (fuerza bruta ilimitada).
        # Con $remote_addr el encabezado se SOBRESCRIBE con la IP real de la
        # conexión TCP, que no se puede falsificar.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # --- Frontend React ---
    root /srv/ingenioblocks/frontend/dist;
    index index.html;

    # Los assets con hash en el nombre no cambian nunca: se cachean fuerte.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html NO se cachea: es el que apunta a los assets nuevos tras un
    # despliegue. Si se cachea, la gente sigue viendo la versión anterior.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA: cualquier ruta desconocida la resuelve React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
