{% comment %}
  Base de todos los correos.

  El HTML de correo NO es HTML web. Restricciones que explican por qué esto se
  ve "antiguo" a propósito:

  - Layout con <table>, no flex ni grid: Outlook (motor de Word) no los soporta.
  - Estilos EN LÍNEA en cada etiqueta: Gmail recorta el <style> del <head> en
    varios casos, sobre todo al reenviar.
  - Sin tipografías web: casi ningún cliente carga Google Fonts. Se usa una
    pila de fuentes del sistema; Quicksand/Outfit solo aparecerán en los
    clientes que ya las tengan.
  - Sin background-image para lo importante: Outlook las ignora. La cabecera
    lleva bgcolor sólido como respaldo del degradé.
  - Ancho fijo 600px: el estándar que entra bien en todos los clientes.
{% endcomment %}<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{% block asunto %}Ingenio Blocks{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f1f7; -webkit-font-smoothing:antialiased;">

  {# Preheader: el texto de vista previa en la bandeja. Oculto en el cuerpo. #}
  <div style="display:none; font-size:1px; color:#f4f1f7; line-height:1px; max-height:0; max-width:0; opacity:0; overflow:hidden;">
    {% block preheader %}Ingenio Blocks{% endblock %}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f1f7;">
    <tr>
      <td align="center" style="padding:28px 12px;">

        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:100%; background-color:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 8px 24px rgba(47,0,83,0.10);">

          <!-- Cabecera morada -->
          <tr>
            {% comment %}
              Cuadrícula de la cabecera: mosaico de 28x28 que se repite, igual
              que el background-size del sitio.

              Va DENTRO del mismo background-image que el degradé, separado por
              coma (la primera capa queda encima). Si se pusiera solo en el
              atributo `background`, el background-image del CSS lo pisaría y no
              se vería nada.

              Degradación por cliente:
              - Apple Mail, Gmail web, iOS: cuadrícula + degradé.
              - Outlook de escritorio: ignora background-image (motor de Word) y
                se queda con bgcolor, o sea morado sólido sin textura. Se ve
                bien igual, que es el punto de dejar el bgcolor.
            {% endcomment %}
            <td bgcolor="#3d0269" align="center" background="{{ grid_src }}"
                style="background-color:#3d0269;
                       background-image:url('{{ grid_src }}'), linear-gradient(135deg,#2f0053 10%,#590599 85%);
                       background-repeat:repeat, no-repeat;
                       padding:34px 24px;">
              {# width/height en el atributo, no solo en CSS: Outlook ignora el CSS de tamaño en <img>. #}
              <img src="{{ logo_src }}" width="155" height="79" alt="Ingenio Blocks"
                   style="display:block; border:0; outline:none; text-decoration:none; width:155px; height:79px;">
            </td>
          </tr>

          <!-- Franja amarilla separadora -->
          <tr><td bgcolor="#ffcb00" style="background-color:#ffcb00; height:5px; line-height:5px; font-size:0;">&nbsp;</td></tr>

          <!-- Contenido -->
          <tr>
            <td style="padding:34px 38px 30px;">
              <h1 style="margin:0 0 6px; font-family:'Quicksand',Verdana,Geneva,sans-serif; font-size:24px; line-height:1.3; font-weight:bold; color:#2f0053;">
                {% block titulo %}{% endblock %}
              </h1>
              <div style="width:56px; height:4px; background-color:#ffcb00; border-radius:2px; margin:0 0 20px;"></div>

              {% block contenido %}{% endblock %}
            </td>
          </tr>

          <!-- Pie -->
          <tr>
            <td bgcolor="#faf8fc" style="background-color:#faf8fc; padding:22px 38px; border-top:1px solid #ece5f4;">
              <p style="margin:0 0 8px; font-family:Arial,Helvetica,sans-serif; font-size:12px; line-height:1.7; color:#8a8095;">
                ¿Dudas? Escríbenos a
                <a href="mailto:{{ contacto_email }}" style="color:#8200db; text-decoration:none;">{{ contacto_email }}</a>
                o al <a href="https://wa.me/56985026926" style="color:#8200db; text-decoration:none;">+56 9 8502 6926</a>.
              </p>
              <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:11px; line-height:1.6; color:#b0a8ba;">
                Ingenio Blocks · Las Condes, Santiago — Chile<br>
                Recibiste este correo porque tienes una compra o cuenta con nosotros.
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
