{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Ingresar · Panel IngenioBlocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'panel/panel.css' %}" rel="stylesheet">
</head>
<body class="login-body">

<div class="login-shape s1"></div>
<div class="login-shape s2"></div>
<div class="login-shape s3"></div>
<div class="login-shape s4"></div>

<div class="login-card">
  <div class="pnl-brand">
    <img src="{% static 'panel/img/logo-icon.svg' %}" alt="IngenioBlocks" class="pnl-brand-icon">
    <div class="pnl-brand-name">IngenioBlocks<small>Panel de gestión</small></div>
  </div>

  <h1>¡Hola de nuevo! 👋</h1>
  <p class="sub">Ingresa con tu cuenta de administración.</p>

  {% if error %}
    <div class="alert alert-danger pnl-alert py-2">{{ error }}</div>
  {% endif %}

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="{{ form.email.id_for_label }}">{{ form.email.label }}</label>
      {{ form.email }}
    </div>
    <div class="mb-4">
      <label class="form-label" for="{{ form.password.id_for_label }}">{{ form.password.label }}</label>
      {{ form.password }}
    </div>
    <button type="submit" class="btn btn-brand">Entrar al panel</button>
  </form>
</div>

</body>
</html>
